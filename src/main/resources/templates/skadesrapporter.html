<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Oversigt</title>
    <link rel="stylesheet" th:href="@{/common.css}">
    <link rel="stylesheet" th:href="@{/showDamageReport.css}">
    <link rel="icon" th:href="@{/images/BILABONNEMENT_favicon.svg}" type="image/png">
</head>
<body>
<header>
    <div th:replace="~{fragment :: navbar}"></div>
</header>
<main>
    <div class="page-header">
        <h1 th:text="${session.loggedInUser.getRoleDisplayName()}"></h1>
    </div>
    <div class="container">
        <div class="container-header">
            <h2>Skadesrapporter</h2>
        </div>
        <div class="section">
            <div th:each="damageReport : ${damageReports}" class="report-item">
                <div>
                    <p id="label">Skadesrapport</p>
                    <p>Mærke: <span th:text="${damageReport.brand}"></span></p>
                    <p>Model: <span th:text="${damageReport.model}"></span></p>
                    <p>Kundens navn: <span th:text="${damageReport.firstName + ' ' + damageReport.lastName}"></span></p>
                </div>
                <a th:if="${session.loggedInUser.hasAccess('skade-udbedring/skadesrapporter')}"
                   th:href="@{/skade-udbedring/skadesrapport(vehicleNo=${damageReport.vehicleNo})}">
                    <button>Åben skadesrapport</button>
                </a>
                <a th:if="${session.loggedInUser.hasAccess('forretningsudvikler/skadesrapporter')}"
                   th:href="@{/forretningsudvikler/skadesrapport(vehicleNo=${damageReport.vehicleNo})}">
                    <button>Åben skadesrapport</button>
                </a>
            </div>
        </div>
    </div>
</main>

</body>
</html>
