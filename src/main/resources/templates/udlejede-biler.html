<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Udlejde biler</title>
    <link rel="stylesheet" th:href="@{/common.css}">
    <link rel="stylesheet" th:href="@{/ListeGrid.css}">
</head>
<body>
<header>
    <div th:replace="~{fragment :: navbar}"></div>
</header>
<main>
    <div class="page-header">
        <h1 th:text="${session.loggedInUser.getRoleDisplayName()}"></h1>
    </div>
    <div class="container">
        <div class="container-header">
            <h2>Udlejede biler</h2>
        </div>

        <div th:if="${cars.isEmpty()}" class="info-message">
            Der er ingen udlejede biler.
        </div>
        <div class="section" id="udlejede-biler-section">
        <table th:unless="${cars.isEmpty()}" class="data-table">
            <thead>
            <tr>
                <th>Vognnr.</th>
                <th>Stelnr.</th>
                <th>Mærke</th>
                <th>Model</th>
                <th>Pris</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="car : ${cars}">
                <td th:text="${car.vehicleNo}"></td>
                <td th:text="${car.chassisNo}"></td>
                <td th:text="${car.brand}"></td>
                <td th:text="${car.model}"></td>
                <td th:text="${car.purchasePrice} + ' kr.'"></td>
                <td th:text="${car.status}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
