<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Opret bruger</title>
    <link rel="stylesheet" th:href="@{/common.css}">
    <link rel="stylesheet" th:href="@{/loginStyle.css}">
    <link rel="stylesheet" th:href="@{/createUserStyles.css}">
    <link rel="icon" th:href="@{/images/BILABONNEMENT_favicon.svg}" type="image/png">
</head>
<body>
<header>
    <div th:replace="~{fragment :: navbar}"></div>
</header>
<main>
    <div class="page-header">
        <h1 th:text="${session.loggedInUser.getRoleDisplayName()}"></h1>
    </div>
    <div class="create-user-container">
        <form class="form-wrapper" th:action="@{/admin/opret-bruger}" method="post">
            <div class="create-user-form">
                <h2 class="form-title">Opret bruger</h2>

                <div th:if="${param.success}" class="success-message">
                    <p>Brugeren er oprettet</p>
                    <br>
                </div>

                <div th:if="${errorMessage}" class="error-message">
                    <p th:text="${errorMessage}"></p>
                    <br>
                </div>

                <div class="username-wrapper">
                    <div class="form-group">
                        <input type="text" id="username" name="username" th:value="${username}" placeholder=" "
                               required>
                        <label for="username">Brugernavn</label>
                    </div>
                </div>

                <div class="password-wrapper">
                    <div class="form-group">
                        <input type="password" id="password" name="password" placeholder=" " required>
                        <label for="password">Adgangskode</label>
                    </div>
                </div>

                <div class="role-wrapper">
                    <div class="form-group">
                        <select name="role">
                            <option value="" disabled selected>Vælg rolle</option>
                            <option value="dataregistrering" th:selected="${role == 'dataRegistering'}">Dataregistrering
                            </option>
                            <option value="skadeudbedring" th:selected="${role == 'skadeudbedring'}">Skade og Udbedring
                            </option>
                            <option value="forretningsudvikler" th:selected="${role == 'forretningsudvikler'}">
                                Forretningsudvikler
                            </option>
                        </select>
                    </div>
                </div>

                <div class="button-wrapper">
                    <div class="form-actions">
                        <button type="submit" class="btn" id="btn-submit">Opret bruger</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</main>
</body>
</html>
