<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tilbageleverede biler</title>
    <link rel="stylesheet" th:href="@{/common.css}">
    <link rel="stylesheet" th:href="@{/ListeGrid.css}">
</head>
<body>
<header>
    <div th:replace="~{fragment :: navbar}"></div>
</header>
<main>
    <div class="page-header">
        <h1 th:text="${session.loggedInUser.getRoleDisplayName()}"></h1>
    </div>
    <div class="container">
        <div class="container-header">
            <h2>Tilbageleverede biler</h2>
        </div>

        <div th:if="${cars.isEmpty()}" class="info-message">
            Der er ingen tilbageleverede biler.
        </div>
        <div class="section" id="tilbageleverede-biler-section">
            <table th:if="${!cars.isEmpty()}" class="data-table">
                <thead>
                <tr>
                    <th>Vognnr.</th>
                    <th>Stelnr.</th>
                    <th>Mærke</th>
                    <th>Model</th>
                    <th>Handling</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="car : ${cars}" class="car-card">
                    <td th:text="${car.vehicleNo}"></td>
                    <td th:text="${car.chassisNo}"></td>
                    <td th:text="${car.brand}"></td>
                    <td th:text="${car.model}"></td>
                    <td>
                        <form th:action="@{/skade-udbedring/skadesrapport}" method="get">
                            <input type="hidden" name="vehicleNo" th:value="${car.vehicleNo}">
                            <button type="submit">Åben skadesrapport</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
