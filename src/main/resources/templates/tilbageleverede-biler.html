<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tilbageleverede biler</title>
    <link rel="stylesheet" th:href="@{/ListeGrid.css}">
</head>
<body>
<div th:replace="~{fragment/navbar :: navbar}"></div>

<main class="container">
    <h1>Tilbageleverede biler</h1>
    <p>Vælg en bil for at oprette en skadesrapport</p>

    <div th:if="${cars.isEmpty()}" class="info-message">
        Der er ingen tilbageleverede biler.
    </div>

    <table th:if="${!cars.isEmpty()}" class="data-table">
        <thead>
        <tr>
            <th>Vognnr.</th>
            <th>Stelnr.</th>
            <th>Mærke</th>
            <th>Model</th>
            <th>Handling</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="car : ${cars}" class="car-card">
            <td th:text="${car.vehicle_no}"></td>
            <td th:text="${car.chassis_no}"></td>
            <td th:text="${car.brand}"></td>
            <td th:text="${car.model}"></td>
            <td>
                <a th:href="@{/skade/opret-skadesrapport(carId=${car.vehicle_no})}">Opret skadesrapport</a>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
